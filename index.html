<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Build Room #1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" async defer></script>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #000000;
        color: #f0f0f0;
        -webkit-tap-highlight-color: transparent;
    }

    /* === App Shell === */
    .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        height: 100dvh;
    }

    /* === Top Bar === */
    .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 18px;
        background: #161616;
        border-bottom: 1px solid #222;
        gap: 14px;
        flex-shrink: 0;
    }
    .topbar-title {
        flex: 1;
        text-align: center;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .topbar-room {
        font-size: 11px;
        color: #888;
        background: #222;
        padding: 3px 8px;
        border-radius: 4px;
    }
    .topbar-logo {
        display: flex;
        align-items: center;
        flex-shrink: 0;
    }
    .topbar-logo img {
        height: 40px;
        width: auto;
        display: block;
    }
    .topbar-logo-fallback {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 1px;
        line-height: 40px;
        display: none;
    }
    .topbar-print-btn {
        margin-left: 12px;
        min-width: 44px;
        min-height: 44px;
        padding: 8px 14px;
        background: #222;
        color: #f0f0f0;
        border: 1px solid #444;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
    }
    .topbar-print-btn:active {
        background: #333;
    }
    @media print {
        .topbar-print-btn { display: none; }
        /* Requirement 1.9: @media print from interactive view shows normal interactive layout */
        /* Poster is only shown via JS toggle, not via @media print */
    }

    /* === Map View === */
    .map-view {
        flex: 1;
        overflow: hidden;
        position: relative;
        touch-action: none;
    }
    .map-scroll {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2px;
    }
    .map-svg {
        width: 100%;
        height: 100%;
    }

    /* === SVG Styles === */
    .room-border {
        fill: #161616;
        stroke: #333;
        stroke-width: 2;
        rx: 6;
    }
    .cab {
        fill: #1e1e1e;
        stroke: #444;
        stroke-width: 1.5;
        rx: 4;
        cursor: pointer;
        transition: fill 0.15s, stroke 0.15s;
    }
    .cab:active { fill: #2a2a2a; }
    .cab.selected { fill: #0d1b2a; stroke: #005BAC; stroke-width: 2.5; }

    .cab-text {
        fill: #ddd;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
    }
    .cab-subtext {
        fill: #777;
        font-size: 8px;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
    }
    .fixture-rect {
        fill: none;
        stroke: #2a2a2a;
        stroke-width: 1;
    }
    .fixture-text {
        fill: #444;
        font-size: 9px;
        text-anchor: middle;
        dominant-baseline: middle;
    }
    .door-line { stroke: #005BAC; stroke-width: 3; stroke-linecap: round; }
    .door-text {
        fill: #005BAC;
        font-size: 8px;
        font-weight: 600;
        text-anchor: middle;
        letter-spacing: 1px;
    }
    .wall-label {
        fill: #9aa0a6;
        font-size: 13px;
        font-weight: 700;
        text-anchor: middle;
        letter-spacing: 1.5px;
    }
    .window-line {
        stroke: #6c7a8a;
        stroke-width: 5;
        stroke-linecap: round;
    }

    /* === Back Button Overlay === */
    .back-btn {
        position: absolute;
        top: 12px;
        left: 12px;
        min-width: 44px;
        min-height: 44px;
        padding: 8px 14px;
        background: #222;
        color: #f0f0f0;
        border: 1px solid #444;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        z-index: 5;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
    }
    .back-btn.visible {
        opacity: 1;
        pointer-events: auto;
    }
    .back-btn:active {
        background: #333;
    }

    /* === Bottom Sheet === */
    .sheet-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        z-index: 10;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1a1a1a;
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 20;
        max-height: 40vh;
        max-height: 40dvh;
        display: flex;
        flex-direction: column;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
        width: 36px;
        height: 4px;
        background: #444;
        border-radius: 2px;
        margin: 10px auto 0;
        flex-shrink: 0;
    }
    .sheet-header {
        padding: 14px 20px 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    .sheet-title {
        font-size: 16px;
        font-weight: 600;
        flex: 1;
    }
    .sheet-status {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 4px;
        font-weight: 600;
    }
    

    .sheet-location {
        padding: 0 20px 12px;
        font-size: 12px;
        color: #666;
    }
    .sheet-body {
        flex: 1;
        overflow-y: auto;
        padding: 0 20px 24px;
        -webkit-overflow-scrolling: touch;
    }
    .section-title {
        font-size: 11px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 16px 0 8px;
    }
    .section-title:first-child { margin-top: 0; }
    .item-list { list-style: none; }
    .item-list li {
        padding: 8px 0;
        font-size: 14px;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .item-list li:last-child { border-bottom: none; }
    .item-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #444;
        flex-shrink: 0;
    }

    /* === Desktop: Side Panel Instead of Sheet === */
    @media (min-width: 769px) {
        .app { flex-direction: row; }
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 5;
        }
        .map-view { margin-top: 46px; }
        .sheet-backdrop { display: none; }
        .sheet {
            position: relative;
            transform: none;
            width: 340px;
            max-height: none;
            height: calc(100% - 46px);
            margin-top: 46px;
            border-radius: 0;
            border-left: 1px solid #222;
            flex-shrink: 0;
        }
        .sheet.open { transform: none; }
        .sheet-handle { display: none; }
    }

    /* === Print Poster View === */
    #posterView {
        display: none;
        background: #fff;
        color: #000;
        padding: 0.5in;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
    }
    #posterView.visible { display: block; }
    #posterView .poster-header {
        text-align: center;
        margin-bottom: 0.3in;
    }
    #posterView .poster-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #000;
    }
    #posterView .poster-subtitle {
        font-size: 12px;
        color: #555;
    }
    #posterView .poster-qr {
        text-align: center;
        margin-bottom: 0.25in;
    }
    #posterView .poster-qr-container {
        display: inline-block;
        min-width: 128px;
        min-height: 128px;
    }
    #posterView .poster-qr-placeholder {
        display: inline-block;
        min-width: 128px;
        min-height: 128px;
        border: 2px dashed #999;
        padding: 16px;
        font-size: 11px;
        color: #555;
        text-align: center;
        line-height: 1.4;
    }
    #posterView .poster-qr-label {
        font-size: 10px;
        color: #666;
        margin-top: 4px;
    }
    #posterView .poster-map {
        width: 100%;
        max-width: 7.5in;
        margin: 0 auto;
        display: block;
    }
    #posterView .poster-map svg {
        width: 100%;
        height: auto;
    }
    #posterView .poster-back-btn {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 8px 16px;
        background: #333;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        z-index: 100;
    }
    #posterView .poster-back-btn:hover { background: #555; }

    /* Poster annotations */
    #posterView .poster-annotation-text {
        font-size: 7px;
        fill: #000;
        font-weight: 600;
    }
    #posterView .poster-annotation-cats {
        font-size: 6px;
        fill: #333;
    }
    #posterView .poster-leader-line {
        stroke: #000;
        stroke-width: 0.5;
        fill: none;
    }

    /* Poster SVG element styles */
    #posterView .poster-room-border {
        fill: #fff;
        stroke: #000;
        stroke-width: 2;
    }
    #posterView .poster-cab {
        fill: #f5f5f5;
        stroke: #000;
        stroke-width: 1;
    }
    #posterView .poster-cab-text {
        fill: #000;
        font-size: 9px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
    }
    #posterView .poster-fixture-rect {
        fill: none;
        stroke: #000;
        stroke-width: 1;
    }
    #posterView .poster-fixture-text {
        fill: #000;
        font-size: 9px;
        text-anchor: middle;
        dominant-baseline: middle;
    }
    #posterView .poster-door-line {
        stroke: #000;
        stroke-width: 2.5;
        stroke-linecap: round;
    }
    #posterView .poster-door-text {
        fill: #000;
        font-size: 8px;
        font-weight: 600;
        text-anchor: middle;
    }
    #posterView .poster-wall-label {
        fill: #555;
        font-size: 7px;
        text-anchor: middle;
        letter-spacing: 0.5px;
    }

    /* Poster legend (numbered list matching map markers) */
    #posterView .poster-legend {
        max-width: 7.5in;
        margin: 0.25in auto 0;
        columns: 2;
        column-gap: 0.4in;
    }
    #posterView .legend-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
        break-inside: avoid;
    }
    #posterView .legend-num {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #005BAC;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
    }
    #posterView .legend-text {
        display: flex;
        flex-direction: column;
        font-size: 11px;
        line-height: 1.3;
    }
    #posterView .legend-text strong { color: #000; font-size: 12px; }
    #posterView .legend-cats { color: #444; font-size: 10px; }

    /* Print-specific styles for poster */
    @media print {
        #posterView .poster-back-btn { display: none; }
        #posterView {
            padding: 0;
            min-height: auto;
        }
    }
    @page {
        size: letter portrait;
        margin: 0.5in;
    }
    /* === Full-screen Station Detail View === */
    .detail-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: #050505;
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
    }
    .detail-overlay.open {
        opacity: 1;
        pointer-events: auto;
    }
    .detail-close {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .detail-close:active { background: #2a2a2a; }

    /* The stage holds the big animated rectangle */
    .detail-stage {
        flex: 1 1 auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 56px 20px 12px;
        min-height: 0;
    }
    .detail-box {
        width: min(88vw, 460px);
        height: min(38vh, 260px);
        border: 3px solid #005BAC;
        border-radius: 12px;
        background: #0d1b2a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px;
        transform-origin: center center;
        box-shadow: 0 0 40px rgba(0,91,172,0.25);
    }
    .detail-box-name {
        font-size: 26px;
        font-weight: 700;
        color: #fff;
        text-align: center;
        line-height: 1.2;
        letter-spacing: 0.3px;
    }
    .detail-box-status {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 4px 12px;
        border-radius: 20px;
    }
    .detail-box-status.open   { background: #14351f; color: #5fd08a; }
    .detail-box-status.closed { background: #0a2740; color: #4a9eff; }

    /* Zoom-in animation (standard) and rotate-in (for sideways stations) */
    @keyframes detailZoomIn {
        from { transform: scale(0.55); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
    }
    @keyframes detailRotateIn {
        from { transform: rotate(-90deg) scale(0.5); opacity: 0; }
        to   { transform: rotate(0deg)   scale(1);   opacity: 1; }
    }
    .detail-box.anim            { animation: detailZoomIn 0.42s cubic-bezier(0.22,1,0.36,1) both; }
    .detail-box.anim.was-vertical { animation: detailRotateIn 0.55s cubic-bezier(0.22,1,0.36,1) both; }

    /* Inventory panel */
    .detail-panel {
        flex: 0 0 auto;
        width: 100%;
        max-width: 560px;
        padding: 12px 22px 20px;
        overflow-y: auto;
        max-height: 46vh;
        -webkit-overflow-scrolling: touch;
    }
    .detail-panel-head {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 10px;
    }
    .detail-title { font-size: 18px; font-weight: 700; color: #fff; }
    .detail-location { font-size: 12px; color: #888; }
    .detail-inv-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #666;
        border-bottom: 1px solid #222;
        padding-bottom: 6px;
        margin-bottom: 6px;
    }
    .detail-list { list-style: none; }
    .detail-list li {
        padding: 11px 4px;
        font-size: 15px;
        color: #eaeaea;
        border-bottom: 1px solid #1c1c1c;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .detail-list li:before {
        content: "";
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #005BAC;
        flex-shrink: 0;
    }
    .detail-list li.empty {
        color: #777;
        font-style: italic;
        justify-content: center;
    }
    .detail-list li.empty:before { display: none; }
    .detail-hint {
        flex-shrink: 0;
        padding: 6px 0 14px;
        font-size: 11px;
        color: #555;
    }

    /* Desktop: rectangle left, inventory right */
    @media (min-width: 769px) {
        .detail-overlay { flex-direction: row; flex-wrap: wrap; align-content: center; justify-content: center; gap: 30px; }
        .detail-stage { flex: 0 0 auto; width: auto; padding: 20px; }
        .detail-box { width: 380px; height: 300px; }
        .detail-panel { width: 360px; max-height: 70vh; }
        .detail-hint { position: absolute; bottom: 16px; }
    }

    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <span class="topbar-logo">
            <img src="tenneco-shark.png" alt="Tenneco" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span class="topbar-logo-fallback">TENNECO</span>
        </span>
        <span class="topbar-title">Engine Build Room #1</span>
        <button class="topbar-print-btn" onclick="PrintPoster.generate()">Print</button>
    </div>

    <div class="map-view">
        <div class="map-scroll">
            <svg class="map-svg" viewBox="0 0 700 550" preserveAspectRatio="xMidYMid meet">
                <!-- 
                    Layout grid:
                    - ViewBox: 700 x 550
                    - Room border inset: starts at (80,50) with size 540x420
                    - Wall labels sit OUTSIDE the room border
                    - All fixtures must stay within (82,52) to (618,468)
                -->

                <!-- EXTERNAL Wall Labels (outside the room border) -->
                <text class="wall-label" x="350" y="38">BACK WALL</text>
                <text class="wall-label" x="350" y="492">FRONT WALL</text>
                <text class="wall-label" x="52" y="260" transform="rotate(-90 52 260)">LEFT WALL</text>
                <text class="wall-label" x="648" y="260" transform="rotate(90 648 260)">RIGHT WALL</text>

                <!-- Room border (the main rectangle) -->
                <rect class="room-border" x="80" y="50" width="540" height="420"/>

                <!-- Window indicator (back wall, directly over Open Workbench) -->
                <line class="window-line" x1="290" y1="50" x2="435" y2="50"/>
                <text class="fixture-text" x="362" y="44">WINDOW</text>

                <!-- Double door entry (front wall, centered in the gap) -->
                <rect x="285" y="466" width="130" height="8" fill="#000000"/>
                <line class="door-line" x1="290" y1="470" x2="410" y2="470"/>
                <text class="fixture-text" x="350" y="486">DOUBLE DOOR</text>

                <!-- Cabinet layer (rendered by JS from FIXTURES) -->
                <g id="cabLayer"></g>
            </svg>
        </div>
    </div>

    <div class="sheet-backdrop" id="backdrop"></div>
    <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <span class="sheet-title" id="sheetTitle">Select a cabinet</span>
            <span class="sheet-status" id="sheetStatus"></span>
        </div>
        <div class="sheet-location" id="sheetLocation"></div>
        <div class="sheet-body" id="sheetBody">
            <p style="color:#666; font-size:13px; padding-top:20px; text-align:center;">Tap a cabinet on the map to see what's inside.</p>
        </div>
    </div>
</div>

<script>
// ================================================================
// ROOM DATA — Flat cabinet model: { name, location, categories[] }
// Constraints: name ≤30 chars, location ≤50 chars, 1–10 categories each ≤40 chars
// ================================================================
const ROOM = {
    // ---- BACK WALL (left -> right) ----
    pegBench: {
        name: "Workbench + Pegboard",
        location: "Back wall · left section",
        categories: [
            "Combination wrenches (SAE & metric)",
            "Pipe wrench",
            "Socket bins",
            "Blue parts bins"
        ]
    },
    openBench: {
        name: "Open Workbench",
        location: "Back wall · center",
        categories: []
    },
    backCab: {
        name: "Cabinet (Closed)",
        location: "Back wall · right corner",
        categories: [
            "General storage",
            "Overflow parts"
        ]
    },

    // ---- LEFT WALL (single consolidated workbench) ----
    leftWorkbench: {
        name: "Workbench",
        location: "Left wall · full length",
        categories: [
            "Flashlight charging station",
            "Bench vise",
            "Hammers & mallets",
            "Punches & drifts",
            "Snap-On pull set",
            "Work lights & chargers"
        ]
    },

    // ---- RIGHT WALL (back -> front) ----
    rightCabUpper: {
        name: "Cabinet (Closed)",
        location: "Right wall · upper",
        categories: [
            "Micrometers & calipers",
            "Torque wrenches",
            "Dial indicators",
            "Blue-Point cases"
        ]
    },
    rightCabLower: {
        name: "Cabinet (Closed)",
        location: "Right wall · lower",
        categories: [
            "Cummins service tools",
            "Seal drivers",
            "Gauge sets",
            "Small-parts bins"
        ]
    },

    // ---- FRONT AREA ----
    frontCab: {
        name: "Cabinet (Closed)",
        location: "Front · left of door",
        categories: [
            "Secured general storage"
        ]
    },
    toolBox: {
        name: "Tool Box",
        location: "Front · right of door",
        categories: [
            "Diagnostic scale / scanner",
            "Drawered hand tools",
            "Cables & adapters"
        ]
    }
};

// ================================================================
// FIXTURES — Single source of truth for cabinet geometry.
// Drives BOTH the interactive SVG and the print poster.
//
// Room border: x=80, y=50, w=540, h=420
// Safe interior: (90, 60) to (610, 460) — 10px padding from border
//
// ALL "Cabinet (Closed)" items use identical size: CAB_W x CAB_H
// ================================================================
const CAB_W = 100, CAB_H = 55;  // Horizontal cabinets (back/front walls)

    leftWorkbench: { status: 'closed', sideways: true },
    rightCabUpper: { status: 'closed', sideways: true },
    rightCabLower: { status: 'closed', sideways: true },
    frontCab:      { status: 'closed' },

    { id: 'openBench',       x: 285, y: 62,  w: 155, h: 60, wall: 'back' },

// ================================================================
// ViewBox Controller — Zoom/Pan state management
// ================================================================
const ViewBoxController = {
    /** Full room viewBox (default state) */
    FULL_VIEW: { x: 0, y: 0, w: 700, h: 550 },

    /** Current viewBox state */
    current: { x: 0, y: 0, w: 700, h: 550 },

    /** Whether currently zoomed in */
    isZoomed: false,

    /** Reference to the SVG element */
    _svg: null,

    /** Active animation frame ID (for cancellation) */
    _animFrame: null,

    /** Get the SVG element (lazy init) */
    _getSvg() {
        if (!this._svg) {
            this._svg = document.querySelector('.map-svg');
        }
        return this._svg;
    },

    /** Apply current viewBox to the SVG element */
    _applyViewBox() {
        const svg = this._getSvg();
        if (svg) {
            svg.setAttribute('viewBox', `${this.current.x} ${this.current.y} ${this.current.w} ${this.current.h}`);
        }
    },

    /** EaseInOutCubic easing function */
    _easeInOutCubic(t) {
        return t < 0.5
            ? 4 * t * t * t
            : 1 - Math.pow(-2 * t + 2, 3) / 2;
    },

    /**
     * Animate viewBox to target over duration with easing.
     * @param {Object} target - Destination viewBox { x, y, w, h }
     * @param {number} duration - Animation time in ms (default 400)
     * @returns {Promise<void>}
     */
    animateTo(target, duration = 400) {
        return new Promise((resolve) => {
            // Cancel any in-progress animation
            if (this._animFrame) {
                cancelAnimationFrame(this._animFrame);
                this._animFrame = null;
            }

            const start = { ...this.current };
            const startTime = performance.now();

            const step = (now) => {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = this._easeInOutCubic(progress);

                this.current.x = start.x + (target.x - start.x) * eased;
                this.current.y = start.y + (target.y - start.y) * eased;
                this.current.w = start.w + (target.w - start.w) * eased;
                this.current.h = start.h + (target.h - start.h) * eased;

                this._applyViewBox();

                if (progress < 1) {
                    this._animFrame = requestAnimationFrame(step);
                } else {
                    this._animFrame = null;
                    resolve();
                }
            };

            this._animFrame = requestAnimationFrame(step);
        });
    },

    /**
     * Compute zoom viewBox centered on a cabinet and its same-wall neighbors.
     * @param {string} cabinetId - Cabinet identifier (e.g. "cab1")
     * @returns {Object} ViewBox { x, y, w, h }
     */
    computeZoomTarget(cabinetId) {
        const svg = this._getSvg();
        const cabEl = svg.querySelector(`[data-id="${cabinetId}"]`);
        if (!cabEl) return { ...this.FULL_VIEW };

        const wall = cabEl.getAttribute('data-wall');

        // Find all cabinets on the same wall
        const sameWallCabs = svg.querySelectorAll(`[data-wall="${wall}"]`);

        // Get bounding box of the target cabinet
        const targetX = parseFloat(cabEl.getAttribute('x'));
        const targetY = parseFloat(cabEl.getAttribute('y'));
        const targetW = parseFloat(cabEl.getAttribute('width'));
        const targetH = parseFloat(cabEl.getAttribute('height'));

        // Find adjacent cabinets (immediately above and below, or left and right)
        // by sorting same-wall cabinets and selecting neighbors
        const cabInfos = [];
        sameWallCabs.forEach(el => {
            cabInfos.push({
                id: el.getAttribute('data-id'),
                x: parseFloat(el.getAttribute('x')),
                y: parseFloat(el.getAttribute('y')),
                w: parseFloat(el.getAttribute('width')),
                h: parseFloat(el.getAttribute('height'))
            });
        });

        // Sort by position (y for left/right walls, x for back wall)
        if (wall === 'back') {
            cabInfos.sort((a, b) => a.x - b.x);
        } else {
            cabInfos.sort((a, b) => a.y - b.y);
        }

        // Find index of target cabinet
        const targetIdx = cabInfos.findIndex(c => c.id === cabinetId);

        // Include adjacent cabinets (one before and one after)
        const startIdx = Math.max(0, targetIdx - 1);
        const endIdx = Math.min(cabInfos.length - 1, targetIdx + 1);
        const includedCabs = cabInfos.slice(startIdx, endIdx + 1);

        // Compute bounding box of all included cabinets
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        includedCabs.forEach(c => {
            minX = Math.min(minX, c.x);
            minY = Math.min(minY, c.y);
            maxX = Math.max(maxX, c.x + c.w);
            maxY = Math.max(maxY, c.y + c.h);
        });

        // Add padding (20% of the bounding area on each side)
        const bboxW = maxX - minX;
        const bboxH = maxY - minY;
        const padX = bboxW * 0.25;
        const padY = bboxH * 0.25;

        let viewW = bboxW + padX * 2;
        let viewH = bboxH + padY * 2;

        // Maintain the room aspect ratio (4:3 = 600:450)
        const aspect = 600 / 450;
        if (viewW / viewH > aspect) {
            viewH = viewW / aspect;
        } else {
            viewW = viewH * aspect;
        }

        // Center on the target cabinet midpoint
        const centerX = targetX + targetW / 2;
        const centerY = targetY + targetH / 2;

        let viewX = centerX - viewW / 2;
        let viewY = centerY - viewH / 2;

        // Clamp to room boundaries
        viewX = Math.max(0, Math.min(viewX, 700 - viewW));
        viewY = Math.max(0, Math.min(viewY, 550 - viewH));

        // Ensure view dimensions don't exceed room
        viewW = Math.min(viewW, 700);
        viewH = Math.min(viewH, 550);

        return { x: viewX, y: viewY, w: viewW, h: viewH };
    },

    /**
     * Apply pan delta, clamping to room boundaries.
     * @param {number} dx - Horizontal delta in SVG units
     * @param {number} dy - Vertical delta in SVG units
     */
    pan(dx, dy) {
        let newX = this.current.x + dx;
        let newY = this.current.y + dy;

        // Clamp: x >= 0, y >= 0, x+w <= 700, y+h <= 550
        newX = Math.max(0, Math.min(newX, 700 - this.current.w));
        newY = Math.max(0, Math.min(newY, 550 - this.current.h));

        this.current.x = newX;
        this.current.y = newY;

        this._applyViewBox();
    },

    /**
     * Reset to full view with animation.
     * @returns {Promise<void>}
     */
    resetToFull() {
        this.isZoomed = false;
        return this.animateTo(this.FULL_VIEW);
    }
};

// ================================================================
// UI Logic
// ================================================================
const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');
const sheetTitle = document.getElementById('sheetTitle');
const sheetStatus = document.getElementById('sheetStatus');
const sheetLocation = document.getElementById('sheetLocation');
const sheetBody = document.getElementById('sheetBody');
const isMobile = () => window.innerWidth < 769;

let selected = null;

backdrop.addEventListener('click', closeSheet);

function openCabinet(id) {
    const data = ROOM[id];
    if (!data) return;

    // Highlight
    document.querySelectorAll('.cab').forEach(c => c.classList.remove('selected'));
    document.querySelector(`[data-id="${id}"]`).classList.add('selected');
    selected = id;

    // Fill sheet
    sheetTitle.textContent = data.name;
    sheetLocation.textContent = data.location;
    sheetStatus.textContent = '';
    sheetStatus.className = 'sheet-status';

    let html = '';
    if (data.categories.length === 0) {
        html = '<p style="color:#666; font-size:13px; padding-top:20px; text-align:center;">Contents not yet inventoried</p>';
    } else {
        html = '<div class="section-title">Categories</div><ul class="item-list">';
        data.categories.forEach(cat => {
            html += `<li><span class="item-dot"></span>${cat}</li>`;
        });
        html += '</ul>';
    }
    sheetBody.innerHTML = html;

    // Open sheet on mobile only when zoomed (Detail Panel requires Zoom_View)
    if (isMobile() && ViewBoxController.isZoomed) {
        sheet.classList.add('open');
        backdrop.classList.add('open');
    }
}

function closeSheet() {
    if (isMobile()) {
        sheet.classList.remove('open');
        backdrop.classList.remove('open');
    }
}

// Swipe down to close panel on mobile (≥80px gesture, map stays in Zoom_View)
let sheetTouchStartY = 0;
let sheetTouchActive = false;
sheet.addEventListener('touchstart', e => {
    sheetTouchStartY = e.touches[0].clientY;
    sheetTouchActive = true;
}, { passive: true });
sheet.addEventListener('touchmove', e => {
    if (!sheetTouchActive) return;
    const dy = e.touches[0].clientY - sheetTouchStartY;
    if (dy >= 80) {
        // Swipe down on the detail bar dismisses the panel AND zooms back out
        // to the full room in one motion (replaces the old Back button).
        sheetTouchActive = false;
        closeSheet();
        if (ViewBoxController.isZoomed) {
            ViewBoxController.resetToFull().then(updateBackButton);
            document.querySelectorAll('.cab').forEach(c => c.classList.remove('selected'));
            selected = null;
        }
    }
}, { passive: true });
sheet.addEventListener('touchend', () => { sheetTouchActive = false; });
sheet.addEventListener('touchcancel', () => { sheetTouchActive = false; });

// Back button removed in the overhaul. Zoom-out now happens via swipe-down on the
// detail bar, tapping empty space, or a pinch-out gesture. updateBackButton() is kept
// as a no-op so existing call sites remain valid.
function updateBackButton() {}

// ================================================================
// Full-screen Station Detail View
// ================================================================
const detailOverlay   = document.getElementById('detailOverlay');
const detailBox       = document.getElementById('detailBox');
const detailBoxName   = document.getElementById('detailBoxName');
const detailBoxStatus = document.getElementById('detailBoxStatus');
const detailTitle     = document.getElementById('detailTitle');
const detailLocation  = document.getElementById('detailLocation');
const detailList      = document.getElementById('detailList');
const detailClose     = document.getElementById('detailClose');

/**
 * Open the full-screen detail view for a station. Zooms in (or rotates in
 * for sideways stations) to fill the screen with the station's box, name,
 * and inventory list.
 * @param {string} id - Station id (key in ROOM/META)
 */
function openDetail(id) {
    const data = ROOM[id];
    if (!data) return;
    const meta = META[id] || {};
    const status = meta.status || 'closed';

    // Box name + status badge
    detailBoxName.textContent = data.name;
    detailBoxStatus.textContent = status === 'open' ? 'OPEN' : 'CLOSED';
    detailBoxStatus.className = 'detail-box-status ' + status;

    // Panel header
    detailTitle.textContent = data.name;
    detailLocation.textContent = data.location || '';

    // Inventory list
    if (!data.categories || data.categories.length === 0) {
        detailList.innerHTML = '<li class="empty">Open — nothing stored here</li>';
    } else {
        detailList.innerHTML = data.categories
            .map(c => `<li>${c.replace(/</g, '&lt;')}</li>`)
            .join('');
    }

    // Orientation: sideways stations rotate upright as they zoom in
    detailBox.classList.toggle('was-vertical', !!meta.sideways);

    // Show overlay and (re)trigger the entrance animation
    detailOverlay.classList.add('open');
    detailBox.classList.remove('anim');
    void detailBox.offsetWidth; // force reflow so the animation restarts
    detailBox.classList.add('anim');
}

function closeDetail() {
    detailOverlay.classList.remove('open');
}

detailClose.addEventListener('click', closeDetail);

// Click on empty overlay area (not the box or panel) closes it
detailOverlay.addEventListener('click', (e) => {
    if (e.target === detailOverlay || e.target.classList.contains('detail-stage')) {
        closeDetail();
    }
});

// Escape key closes (desktop)
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && detailOverlay.classList.contains('open')) closeDetail();
});

// Swipe down to close (mobile)
let detailTouchY = null;
detailOverlay.addEventListener('touchstart', (e) => {
    detailTouchY = e.touches[0].clientY;
}, { passive: true });
detailOverlay.addEventListener('touchmove', (e) => {
    if (detailTouchY === null) return;
    if (e.touches[0].clientY - detailTouchY > 80) {
        closeDetail();
        detailTouchY = null;
    }
}, { passive: true });
detailOverlay.addEventListener('touchend', () => { detailTouchY = null; });

// ================================================================
// Gesture Handler — Unified Pointer Events for touch + mouse
// ================================================================
const GestureHandler = {
    /** @type {HTMLElement|null} Map container element */
    _container: null,

    /** @type {SVGSVGElement|null} SVG element */
    _svg: null,

    /** Active pointers map: pointerId → { x, y, startX, startY, startTime } */
    _pointers: new Map(),

    /** Whether a drag is in progress */
    _isDragging: false,

    /** Tap threshold: max movement in px to still count as tap */
    _TAP_THRESHOLD: 10,

    /** Tap max duration in ms */
    _TAP_MAX_DURATION: 300,

    /** Pinch-out distance increase threshold (px) to trigger zoom-out */
    _PINCH_OUT_THRESHOLD: 50,

    /** Initial pinch distance when two pointers first detected */
    _initialPinchDistance: 0,

    /**
     * Initialize event listeners on the map container.
     * @param {HTMLElement} mapContainer
     */
    init(mapContainer) {
        this._container = mapContainer;
        this._svg = mapContainer.querySelector('.map-svg');

        // Pointer events for unified mouse + touch
        mapContainer.addEventListener('pointerdown', (e) => this._onPointerDown(e));
        mapContainer.addEventListener('pointermove', (e) => this._onPointerMove(e));
        mapContainer.addEventListener('pointerup', (e) => this._onPointerUp(e));
        mapContainer.addEventListener('pointercancel', (e) => this._onPointerUp(e));

        // Scroll-wheel zoom for desktop
        mapContainer.addEventListener('wheel', (e) => this._onWheel(e), { passive: false });
    },

    /**
     * Determine if a pointer event hit a cabinet element.
     * @param {PointerEvent} event
     * @returns {string|null} Cabinet data-id or null
     */
    hitTest(event) {
        const target = event.target;
        // Check if the target itself is a cab rect
        if (target.classList && target.classList.contains('cab')) {
            return target.getAttribute('data-id');
        }
        // Check parent (for cases where text overlays are hit — though pointer-events: none should prevent this)
        if (target.closest) {
            const cabEl = target.closest('.cab');
            if (cabEl) return cabEl.getAttribute('data-id');
        }
        // Use elementsFromPoint as fallback for SVG hit detection
        const elements = document.elementsFromPoint(event.clientX, event.clientY);
        for (const el of elements) {
            if (el.classList && el.classList.contains('cab')) {
                return el.getAttribute('data-id');
            }
        }
        return null;
    },

    /**
     * Get distance between two pointer entries.
     * @param {Object} p1 - { x, y }
     * @param {Object} p2 - { x, y }
     * @returns {number}
     */
    _getDistance(p1, p2) {
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        return Math.sqrt(dx * dx + dy * dy);
    },

    /**
     * Convert pixel delta to SVG coordinate delta.
     * @param {number} dxPx - Pixel delta X
     * @param {number} dyPx - Pixel delta Y
     * @returns {{ dx: number, dy: number }} SVG coordinate deltas
     */
    _pixelToSvgDelta(dxPx, dyPx) {
        const svgRect = this._svg.getBoundingClientRect();
        const scaleX = ViewBoxController.current.w / svgRect.width;
        const scaleY = ViewBoxController.current.h / svgRect.height;
        return { dx: dxPx * scaleX, dy: dyPx * scaleY };
    },

    /**
     * Handle pointer down: track pointer for tap/drag/pinch detection.
     * @param {PointerEvent} e
     */
    _onPointerDown(e) {
        // Capture the pointer for reliable tracking
        this._container.setPointerCapture(e.pointerId);

        this._pointers.set(e.pointerId, {
            x: e.clientX,
            y: e.clientY,
            startX: e.clientX,
            startY: e.clientY,
            startTime: performance.now()
        });

        this._isDragging = false;

        // If two pointers, record initial pinch distance
        if (this._pointers.size === 2) {
            const pts = Array.from(this._pointers.values());
            this._initialPinchDistance = this._getDistance(pts[0], pts[1]);
        }
    },

    /**
     * Handle pointer move: drag/pan or pinch detection.
     * @param {PointerEvent} e
     */
    _onPointerMove(e) {
        if (!this._pointers.has(e.pointerId)) return;

        const pointer = this._pointers.get(e.pointerId);
        const prevX = pointer.x;
        const prevY = pointer.y;

        // Update current position
        pointer.x = e.clientX;
        pointer.y = e.clientY;

        // Check if movement exceeds tap threshold → now dragging
        const totalDx = pointer.x - pointer.startX;
        const totalDy = pointer.y - pointer.startY;
        if (Math.abs(totalDx) > this._TAP_THRESHOLD || Math.abs(totalDy) > this._TAP_THRESHOLD) {
            this._isDragging = true;
        }

        // Single pointer drag/pan in zoomed state
        if (this._pointers.size === 1 && this._isDragging && ViewBoxController.isZoomed) {
            const dxPx = prevX - e.clientX; // Invert: drag right → pan left
            const dyPx = prevY - e.clientY;
            const { dx, dy } = this._pixelToSvgDelta(dxPx, dyPx);
            ViewBoxController.pan(dx, dy);
        }

        // Two-pointer pinch detection
        if (this._pointers.size === 2 && ViewBoxController.isZoomed) {
            const pts = Array.from(this._pointers.values());
            const currentDistance = this._getDistance(pts[0], pts[1]);
            const distanceDelta = currentDistance - this._initialPinchDistance;

            // Pinch-out (fingers spreading apart) → return to full view
            if (distanceDelta > this._PINCH_OUT_THRESHOLD) {
                this._pointers.clear();
                this._isDragging = false;
                this._initialPinchDistance = 0;
                ViewBoxController.resetToFull().then(updateBackButton);
                closeSheet();
                document.querySelectorAll('.cab').forEach(c => c.classList.remove('selected'));
                selected = null;
                updateBackButton();
            }
        }
    },

    /**
     * Handle pointer up: detect tap or end drag.
     * @param {PointerEvent} e
     */
    _onPointerUp(e) {
        const pointer = this._pointers.get(e.pointerId);
        if (!pointer) return;

        // Release capture
        try { this._container.releasePointerCapture(e.pointerId); } catch (_) {}

        this._pointers.delete(e.pointerId);

        // If this was a multi-touch gesture, just clean up
        if (this._pointers.size > 0) return;

        const elapsed = performance.now() - pointer.startTime;
        const totalDx = Math.abs(pointer.x - pointer.startX);
        const totalDy = Math.abs(pointer.y - pointer.startY);

        // Tap detection: short duration, minimal movement
        const isTap = elapsed < this._TAP_MAX_DURATION &&
                      totalDx < this._TAP_THRESHOLD &&
                      totalDy < this._TAP_THRESHOLD;

        if (isTap) {
            this._handleTap(e);
        }

        this._isDragging = false;
    },

    /**
     * Handle tap logic based on current view state.
     * @param {PointerEvent} e
     */
    _handleTap(e) {
        const cabinetId = this.hitTest(e);
        // New model: tapping a station opens the full-screen detail view.
        if (cabinetId) {
            openDetail(cabinetId);
        }
    },

    /** Scroll-wheel is a no-op in the full-screen-detail model. */
    _onWheel(e) { /* intentionally inert */ }
};

// ================================================================
// Render cabinets into the SVG from FIXTURES (single source of truth)
// ================================================================
const SVG_NS = 'http://www.w3.org/2000/svg';

/** Split a station name into 1-2 balanced label lines. */
function wrapLabel(name) {
    if (name.length <= 12) return [name];
    const words = name.split(' ');
    if (words.length === 1) return [name];
    // Find the split point closest to the middle of the string
    let best = 1, bestDiff = Infinity;
    for (let i = 1; i < words.length; i++) {
        const left = words.slice(0, i).join(' ').length;
        const right = words.slice(i).join(' ').length;
        const diff = Math.abs(left - right);
        if (diff < bestDiff) { bestDiff = diff; best = i; }
    }
    return [words.slice(0, best).join(' '), words.slice(best).join(' ')];
}

function renderCabs() {
    const layer = document.getElementById('cabLayer');
    layer.innerHTML = '';
    FIXTURES.forEach(f => {
        const data = ROOM[f.id] || { name: f.id };

        const rect = document.createElementNS(SVG_NS, 'rect');
        rect.setAttribute('class', 'cab');
        rect.setAttribute('data-id', f.id);
        rect.setAttribute('data-wall', f.wall);
        rect.setAttribute('x', f.x);
        rect.setAttribute('y', f.y);
        rect.setAttribute('width', f.w);
        rect.setAttribute('height', f.h);
        layer.appendChild(rect);

        const cx = f.x + f.w / 2;
        const cy = f.y + f.h / 2;

        // Special handling for the tall left workbench: two vertical text columns
        if (f.id === 'leftWorkbench') {
            const columns = [
                { text: 'Work bench', dx: -9, size: '9' },
                { text: 'Closed – Flashlight charging station', dx: 7, size: '7.5' }
            ];
            columns.forEach(col => {
                const lx = cx + col.dx;
                const t = document.createElementNS(SVG_NS, 'text');
                t.setAttribute('class', 'cab-text');
                t.setAttribute('x', lx);
                t.setAttribute('y', cy);
                t.setAttribute('transform', `rotate(-90 ${lx} ${cy})`);
                t.setAttribute('font-size', col.size);
                t.textContent = col.text;
                layer.appendChild(t);
            });

            // Blue "Snap-On Pull Set" indicator flush on the workbench's left edge
            const ind = document.createElementNS(SVG_NS, 'rect');
            ind.setAttribute('x', f.x);
            ind.setAttribute('y', cy - 22);
            ind.setAttribute('width', 6);
            ind.setAttribute('height', 44);
            ind.setAttribute('fill', '#005BAC');
            layer.appendChild(ind);

            const pullLabel = document.createElementNS(SVG_NS, 'text');
            pullLabel.setAttribute('x', f.x - 8);
            pullLabel.setAttribute('y', cy);
            pullLabel.setAttribute('transform', `rotate(-90 ${f.x - 8} ${cy})`);
            pullLabel.setAttribute('class', 'fixture-text');
            pullLabel.setAttribute('text-anchor', 'middle');
            pullLabel.setAttribute('font-size', '7');
            pullLabel.setAttribute('fill', '#4a9eff');
            pullLabel.textContent = 'PULL SET';
            layer.appendChild(pullLabel);
        } else if (f.wall === 'right') {
            // Right-wall cabinets: sideways (vertical) text like the sketch
            const columns = [
                { text: 'Cabinet',  dx: -6, size: '10' },
                { text: '(closed)', dx: 9,  size: '8' }
            ];
            columns.forEach(col => {
                const lx = cx + col.dx;
                const t = document.createElementNS(SVG_NS, 'text');
                t.setAttribute('class', 'cab-text');
                t.setAttribute('x', lx);
                t.setAttribute('y', cy);
                t.setAttribute('transform', `rotate(-90 ${lx} ${cy})`);
                t.setAttribute('font-size', col.size);
                t.textContent = col.text;
                layer.appendChild(t);
            });
        } else {
            // Standard horizontal labels
            const lines = wrapLabel(data.name);
            const lineH = 11;
            const startY = cy - ((lines.length - 1) * lineH) / 2;
            lines.forEach((line, i) => {
                const t = document.createElementNS(SVG_NS, 'text');
                t.setAttribute('class', 'cab-text');
                t.setAttribute('x', cx);
                t.setAttribute('y', startY + i * lineH);
                t.textContent = line;
                layer.appendChild(t);
            });
        }
    });
}

// ================================================================
// Initialize
// ================================================================
renderCabs();
GestureHandler.init(document.querySelector('.map-view'));

// On desktop, auto-show the first station
if (!isMobile()) {
    openCabinet(FIXTURES[0].id);
}

// ================================================================
// Resize Handler — Re-fit view on viewport change
// ================================================================
window.addEventListener('resize', () => {
    if (!ViewBoxController.isZoomed) {
        // In Full_View: re-apply the full viewBox to ensure proper fit
        ViewBoxController.current = { ...ViewBoxController.FULL_VIEW };
        ViewBoxController._applyViewBox();
    } else {
        // In Zoom_View: re-clamp the current viewBox to room bounds
        let { x, y, w, h } = ViewBoxController.current;
        x = Math.max(0, Math.min(x, 700 - w));
        y = Math.max(0, Math.min(y, 550 - h));
        w = Math.min(w, 700);
        h = Math.min(h, 550);
        ViewBoxController.current = { x, y, w, h };
        ViewBoxController._applyViewBox();
    }
});

// ================================================================
// Print Poster Generator
// ================================================================
const PrintPoster = {
    /** GitHub Pages URL for QR code */
    _url: (function() {
        // Use current page URL or fallback
        return window.location.href;
    })(),

    /**
     * Generate and show the print poster view.
     */
    generate() {
        try {
            const app = document.querySelector('.app');
            const posterView = document.getElementById('posterView');

            // Show poster, hide interactive view
            app.style.display = 'none';
            posterView.classList.add('visible');

            // Generate QR code
            this._generateQR();

            // Build numbered static map + matching legend
            this._buildStaticMap();
            this._buildLegend();

            // Brief delay to let QR code render, then print
            setTimeout(() => {
                window.print();
            }, 300);
        } catch (err) {
            alert('Failed to generate poster. Returning to interactive view.');
            this.close();
        }
    },

    /**
     * Close poster view and restore interactive app.
     */
    close() {
        const app = document.querySelector('.app');
        const posterView = document.getElementById('posterView');

        posterView.classList.remove('visible');
        app.style.display = '';
    },

    /**
     * Generate QR code or show placeholder if library unavailable.
     */
    _generateQR() {
        const container = document.getElementById('posterQrContainer');
        container.innerHTML = '';

        if (typeof QRCode !== 'undefined') {
            // Library available — generate QR code (min 113×113px → using 128×128)
            new QRCode(container, {
                text: this._url,
                width: 128,
                height: 128,
                colorDark: '#000000',
                colorLight: '#ffffff'
            });
        } else {
            // Library failed to load — show placeholder text
            container.innerHTML = '<div class="poster-qr-placeholder">QR Code unavailable<br><br>Visit:<br>' +
                this._url.replace(/</g, '&lt;') + '</div>';
        }
    },

    /**
     * Build static SVG map with NUMBERED markers (1..N) that match a legend list.
     * No scattered leader-line callouts — numbers keep the map clean.
     */
    _buildStaticMap() {
        const mapContainer = document.getElementById('posterMapContainer');
        let svgContent = '';

        // Room border
        svgContent += '<rect class="poster-room-border" x="80" y="50" width="540" height="420" rx="6"/>';

        // Wall labels (outside border)
        svgContent += '<text class="poster-wall-label" x="350" y="38">BACK WALL</text>';
        svgContent += '<text class="poster-wall-label" x="350" y="492">FRONT WALL</text>';
        svgContent += '<text class="poster-wall-label" x="52" y="260" transform="rotate(-90 52 260)">LEFT WALL</text>';
        svgContent += '<text class="poster-wall-label" x="648" y="260" transform="rotate(90 648 260)">RIGHT WALL</text>';

        // Window (back wall, over Open Workbench area)
        svgContent += '<line x1="290" y1="50" x2="435" y2="50" style="stroke:#000;stroke-width:4;"/>';
        svgContent += '<text class="poster-fixture-text" x="362" y="44">WINDOW</text>';

        // Entry (double door, centered on front wall)
        svgContent += '<line class="poster-door-line" x1="290" y1="470" x2="410" y2="470"/>';

        // Numbered cabinet rects + number badges
        FIXTURES.forEach((f, i) => {
            const n = i + 1;
            const cx = f.x + f.w / 2;
            const cy = f.y + f.h / 2;
            svgContent += `<rect class="poster-cab" x="${f.x}" y="${f.y}" width="${f.w}" height="${f.h}" rx="4"/>`;
            svgContent += `<circle cx="${cx}" cy="${cy}" r="11" fill="#005BAC"/>`;
            svgContent += `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="12" font-weight="700">${n}</text>`;
        });

        mapContainer.innerHTML = `<svg viewBox="0 0 700 550" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">${svgContent}</svg>`;
    },

    /**
     * Build the numbered legend list that pairs with the map markers.
     */
    _buildLegend() {
        const legend = document.getElementById('posterLegend');
        if (!legend) return;
        let html = '';
        FIXTURES.forEach((f, i) => {
            const data = ROOM[f.id];
            if (!data) return;
            const cats = data.categories && data.categories.length
                ? data.categories.join(', ')
                : 'Contents not yet inventoried';
            html += '<div class="legend-item">' +
                `<span class="legend-num">${i + 1}</span>` +
                '<span class="legend-text">' +
                `<strong>${this._escapeHtml(data.name)}</strong>` +
                `<span class="legend-cats">${this._escapeHtml(cats)}</span>` +
                '</span></div>';
        });
        legend.innerHTML = html;
    },

    /**
     * Format annotation string for a cabinet.
     * @param {Object} cabinet - Cabinet data { name, categories[] }
     * @returns {string} "Cabinet Name: Cat1, Cat2, Cat3"
     */
    formatAnnotation(cabinet) {
        if (!cabinet.categories || cabinet.categories.length === 0) {
            return cabinet.name;
        }
        return cabinet.name + ': ' + cabinet.categories.join(', ');
    },

    /**
     * Escape HTML special characters for SVG text content.
     * @param {string} str
     * @returns {string}
     */
    _escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
};

// Listen for afterprint to restore interactive view
window.addEventListener('afterprint', () => {
    const posterView = document.getElementById('posterView');
    if (posterView.classList.contains('visible')) {
        PrintPoster.close();
    }
});
